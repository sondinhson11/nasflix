<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#0b0b0b" />
    <meta name="description" content="SFLIX - Xem phim bản quyền chất lượng cao, vietsub cập nhật nhanh. Phim bộ, phim lẻ, hoạt hình đầy đủ thể loại." />
    <meta name="keywords" content="xem phim, phim vietsub, phim bản quyền, phim bộ, phim lẻ, hoạt hình, anime, donghua" />
    <meta name="author" content="SFLIX Media" />
    <meta name="robots" content="index, follow" />
    <link rel="icon" type="image/svg+xml" href="assets/images/favicon.svg" />
    <link rel="canonical" href="https://sondinhson.cloud/index.html" />
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="SFLIX" />
    <meta property="og:locale" content="vi_VN" />
    <meta property="og:title" content="SFLIX | Xem Phim Bản Quyền" />
    <meta property="og:description" content="Xem phim bản quyền chất lượng cao, vietsub cập nhật nhanh. Phim bộ, phim lẻ, hoạt hình đầy đủ thể loại." />
    <meta property="og:image" content="https://sondinhson.cloud/assets/images/og-image.svg" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:url" content="https://sondinhson.cloud/index.html" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="SFLIX | Xem Phim Bản Quyền" />
    <meta name="twitter:description" content="Xem phim bản quyền chất lượng cao, vietsub cập nhật nhanh. Phim bộ, phim lẻ, hoạt hình đầy đủ thể loại." />
    <meta name="twitter:image" content="https://sondinhson.cloud/assets/images/og-image.svg" />
    <title>SFLIX | Xem Phim Bản Quyền</title>
    <!-- Thư viện ngoài -->
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css"
    />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@300;400;500;600;700;800&family=Inter:wght@500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <!-- Link CSS của bạn -->
    <link rel="stylesheet" href="assets/css/style.css" />
  </head>
  <body>
    <!-- Navbar Chuyên Nghiệp -->
    <nav class="navbar navbar-expand-lg navbar-custom fixed-top" id="navbar">
      <div class="container-fluid px-3 px-md-5">
        <a class="brand-logo me-4" href="index.html">SFLIX</a>

        <!-- Nav links (collapse trên mobile) -->
        <div class="collapse navbar-collapse" id="navMenu">
          <ul class="navbar-nav me-auto mb-2 mb-lg-0 gap-2">
            <li class="nav-item">
              <a class="nav-link active" href="index.html">Trang Chủ</a>
            </li>
            <li class="nav-item"><a class="nav-link" href="catalog.html?type=series">Phim Bộ</a></li>
            <li class="nav-item"><a class="nav-link" href="catalog.html?type=movies">Phim Lẻ</a></li>
            <li class="nav-item"><a class="nav-link" href="catalog.html?type=hoat-hinh">Hoạt Hình</a></li>
          </ul>
        </div>

        <!-- Các icon bên phải — luôn hiện, không trong collapse -->
        <div class="d-flex align-items-center gap-3 ms-auto">
          <!-- Icon tìm kiếm: hiện trên mọi màn hình -->
          <button
            class="btn-search-mobile"
            id="searchBtnDesktop"
            aria-label="Tìm kiếm"
            title="Tìm kiếm"
          >
            <i class="fa-solid fa-magnifying-glass"></i>
          </button>
          <!-- Bell & Avatar: chỉ desktop -->
          <i
            class="fa-regular fa-bell text-white fs-5 cursor-pointer d-none d-lg-block"
            title="Thông báo"
          ></i>
          <div class="avatar-box d-none d-lg-block">
            <img
              src="https://upload.wikimedia.org/wikipedia/commons/0/0b/Netflix-avatar.png"
              alt="User"
            />
          </div>
          <!-- Hamburger -->
          <button
            class="navbar-toggler border-0 shadow-none text-white p-0"
            type="button"
            data-bs-toggle="collapse"
            data-bs-target="#navMenu"
          >
            <i class="fa-solid fa-bars fs-3"></i>
          </button>
        </div>
      </div>
    </nav>

    <!-- Search Overlay -->
    <div class="search-overlay" id="searchOverlay" hidden>
      <div class="search-overlay-inner">
        <div class="search-box">
          <i class="fa-solid fa-magnifying-glass search-icon-input"></i>
          <input
            type="text"
            id="searchInput"
            class="search-input"
            placeholder="Tìm kiếm phim..."
            autocomplete="off"
            autofocus
          />
          <button class="search-close-btn" id="searchCloseBtn" aria-label="Đóng">
            <i class="fa-solid fa-xmark"></i>
          </button>
        </div>
        <div id="searchResults" class="search-results"></div>
      </div>
    </div>

    <div id="view-home">
      <!-- Hero Banner Mới -->
      <div class="hero" id="heroBanner">
        <div class="hero-vignette"></div>
        <div class="container-fluid px-3 px-md-5 hero-content">
          <div class="hero-meta" id="heroMeta">
            <span
              class="skeleton d-inline-block"
              style="width: 120px; height: 20px"
            ></span>
          </div>

          <h1 class="hero-title" id="heroTitle">
            <span
              class="skeleton d-block mb-2"
              style="width: 80%; height: 70px"
            ></span>
          </h1>

          <p class="hero-desc mb-4" id="heroDesc">
            <span
              class="skeleton d-block mb-1"
              style="width: 100%; height: 20px"
            ></span
            ><span
              class="skeleton d-block"
              style="width: 70%; height: 20px"
            ></span>
          </p>

          <div class="d-flex gap-3">
            <button class="btn-play" id="heroPlayBtn" style="display: none">
              <i class="fa-solid fa-play me-2"></i> Phát
            </button>
            <button class="btn-info" id="heroDetailBtn" style="display: none">
              <i class="fa-solid fa-circle-info me-2"></i> Chi tiết
            </button>
          </div>
        </div>
      </div>

      <!-- Slider Nổi Bật -->
      <div
        class="container-fluid px-3 px-md-5 mt-4"
        style="position: relative; z-index: 5; margin-top: -80px !important"
      >
        <h4 class="section-title">Thịnh Hành Hiện Nay</h4>
        <div class="swiper mySwiper pt-2 pb-4">
          <div class="swiper-wrapper" id="trendingSlider"></div>
        </div>
      </div>

      <!-- Slider Phim Mới Cập Nhật -->
      <div class="container-fluid px-3 px-md-5 mt-4">
        <h4 class="section-title">Mới Cập Nhật</h4>
        <div class="swiper mySwiper2 pt-2 pb-4">
          <div class="swiper-wrapper" id="movieGrid"></div>
        </div>
      </div>

      <!-- Section: Phim Hàn Quốc -->
      <div class="container-fluid px-3 px-md-5 mt-5">
        <div class="section-title-row">
          <h4 class="section-title mb-0">
            <span class="section-flag">🇰🇷</span> Phim Hàn Quốc
          </h4>
          <a href="catalog.html?type=series&country=han-quoc" class="section-view-all">Xem tất cả <i class="fa-solid fa-chevron-right ms-1"></i></a>
        </div>
        <div class="swiper countrySwiper pt-2 pb-4" id="swiperHanQuoc">
          <div class="swiper-wrapper" id="sliderHanQuoc">
            <!-- skeleton -->
            <div class="swiper-slide"><div class="skeleton skeleton-card"></div></div>
            <div class="swiper-slide"><div class="skeleton skeleton-card"></div></div>
            <div class="swiper-slide"><div class="skeleton skeleton-card"></div></div>
            <div class="swiper-slide"><div class="skeleton skeleton-card"></div></div>
            <div class="swiper-slide"><div class="skeleton skeleton-card"></div></div>
          </div>
        </div>
      </div>

      <!-- Section: Phim Trung Quốc -->
      <div class="container-fluid px-3 px-md-5 mt-4">
        <div class="section-title-row">
          <h4 class="section-title mb-0">
            <span class="section-flag">🇨🇳</span> Phim Trung Quốc
          </h4>
          <a href="catalog.html?type=series&country=trung-quoc" class="section-view-all">Xem tất cả <i class="fa-solid fa-chevron-right ms-1"></i></a>
        </div>
        <div class="swiper countrySwiper pt-2 pb-4" id="swiperTrungQuoc">
          <div class="swiper-wrapper" id="sliderTrungQuoc">
            <div class="swiper-slide"><div class="skeleton skeleton-card"></div></div>
            <div class="swiper-slide"><div class="skeleton skeleton-card"></div></div>
            <div class="swiper-slide"><div class="skeleton skeleton-card"></div></div>
            <div class="swiper-slide"><div class="skeleton skeleton-card"></div></div>
            <div class="swiper-slide"><div class="skeleton skeleton-card"></div></div>
          </div>
        </div>
      </div>

      <!-- Section: Phim Âu Mỹ -->
      <div class="container-fluid px-3 px-md-5 mt-4 mb-5">
        <div class="section-title-row">
          <h4 class="section-title mb-0">
            <span class="section-flag">🇺🇸</span> Phim Âu Mỹ
          </h4>
          <a href="catalog.html?type=series&country=au-my" class="section-view-all">Xem tất cả <i class="fa-solid fa-chevron-right ms-1"></i></a>
        </div>
        <div class="swiper countrySwiper pt-2 pb-4" id="swiperAuMy">
          <div class="swiper-wrapper" id="sliderAuMy">
            <div class="swiper-slide"><div class="skeleton skeleton-card"></div></div>
            <div class="swiper-slide"><div class="skeleton skeleton-card"></div></div>
            <div class="swiper-slide"><div class="skeleton skeleton-card"></div></div>
            <div class="swiper-slide"><div class="skeleton skeleton-card"></div></div>
            <div class="swiper-slide"><div class="skeleton skeleton-card"></div></div>
          </div>
        </div>
      </div>
    </div>

    <!-- Footer -->
    <footer class="py-5 mt-5">
      <div class="container-fluid px-3 px-md-5 text-center">
        <p class="mb-2">Hệ thống giải trí nội bộ SFlix Media Center.</p>
        <p class="mb-0">Dữ liệu được cung cấp bởi các API miễn phí.</p>
      </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.js"></script>
    <script src="assets/js/main.js"></script>
  </body>
</html>
